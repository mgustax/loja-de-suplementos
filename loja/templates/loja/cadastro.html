{% extends 'loja/base.html' %}
{% load static %}

{% block title %}Criar Conta - MonsterSups{% endblock %}

{% block content %}
<div class="container-fluid p-0 flex-grow-1 d-flex">
    <div class="row g-0 w-100 flex-grow-1">
        
        <div class="col-lg-6 d-none d-lg-block position-relative" 
             style="background: url('{% static 'loja/img_design/treino.png' %}') center/cover no-repeat;">
            <div class="position-absolute top-0 start-0 w-100 h-100" style="background-color: rgba(65, 20, 20, 0.77);"></div>
        </div>

        <div class="col-lg-6 d-flex flex-column align-items-center justify-content-center bg-black py-4 px-3 px-md-5">
            
            <div class="text-center mb-4">
                <img src="{% static 'loja/img_design/monstersups_correto.PNG' %}" alt="MonsterSups" style="width: 320px; height: auto;">
            </div>
            
            <div class="w-100 bg-white text-dark p-4 p-md-5 shadow-lg mx-auto" style="max-width: 480px; border-radius: 30px;">
                
                <div class="text-center mb-4">
                    <h5 class="fw-bold mb-2" style="font-family: 'Segoe UI', sans-serif;">
                        <span style="color: #BD0110; font-weight: 800;">Crie sua Conta</span> para montar seu combo de suplementos
                    </h5>
                </div>

                {% if error %}
                    <div class="alert alert-danger py-2 small border-0 bg-danger bg-opacity-10 text-danger text-center mb-3" role="alert">
                        <i class="bi bi-exclamation-circle-fill me-2"></i> {{ error }}
                    </div>
                {% endif %}

                <form method="POST" action="{% url 'cadastro' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label small fw-bold text-secondary text-uppercase" style="font-size: 0.75rem; letter-spacing: 0.5px;">Usuário</label>
                        <input type="text" name="username" id="username" class="form-control form-control-lg bg-light border-0 text-dark py-2.5" style="border-radius: 12px; font-size: 0.95rem;" placeholder="Escolha um nome de usuário" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label small fw-bold text-secondary text-uppercase" style="font-size: 0.75rem; letter-spacing: 0.5px;">E-mail</label>
                        <input type="email" name="email" id="email" class="form-control form-control-lg bg-light border-0 text-dark py-2.5" style="border-radius: 12px; font-size: 0.95rem;" placeholder="Ex: seuemail@dominio.com" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label small fw-bold text-secondary text-uppercase" style="font-size: 0.75rem; letter-spacing: 0.5px;">Senha</label>
                        <input type="password" name="password" id="password" class="form-control form-control-lg bg-light border-0 text-dark py-2.5" style="border-radius: 12px; font-size: 0.95rem;" placeholder="Crie uma senha segura" required>
                    </div>
                    
                    <button type="submit" class="btn text-white w-100 fw-bold py-2.5 shadow-sm text-uppercase" style="background-color: #BD0110; border-radius: 12px; letter-spacing: 1px;">
                        Cadastrar <i class="bi bi-person-plus-fill ms-1"></i>
                    </button>
                </form>

                <div class="text-center mt-4 pt-3 border-top border-light-subtle">
                    <span class="text-muted small">Já tem conta? </span>
                    <a href="{% url 'login' %}" class="fw-bold text-decoration-none small" style="color: #BD0110;">Faça Login</a>
                </div>

            </div>

        </div>
    </div>
</div>
{% endblock %}
