{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MonsterSups{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-color: #000000 !important;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Barra vermelha superior - Cor oficial #530D00 */
        .top-bar-monster {
            background-color: #530D00;
            padding: 18px 0;
            width: 100%;
        }

        /* Links do menu superior */
        .top-link-monster {
            color: #ffffff !important;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .top-link-monster:hover {
            opacity: 0.8;
        }

        /* Rodapé colado na parte inferior da tela */
        .footer-monster {
            background-color: #000000;
            color: #666666;
            width: 100%;
            font-size: 0.8rem;
        }
    </style>
</head>
<body class="d-flex flex-column">

    <header class="top-bar-monster shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            
            <a href="{% url 'home' %}" class="d-flex align-items-center">
                <img src="{% static 'loja/img_design/monstersups_correto.PNG' %}" alt="MonsterSups" style="width: 220px; height: auto;">
            </a>

            <nav class="d-flex align-items-center gap-3">
                <a class="top-link-monster" href="{% url 'produtos' %}">
                    Produtos
                </a>
                
                <span class="text-white opacity-50">|</span>
                
                <a class="top-link-monster" href="{% url 'carrinho' %}">
                    <i class="bi bi-cart3 me-1"></i> Carrinho
                </a>
            </nav>

        </div>
    </header>

    <main class="flex-grow-1 d-flex flex-column">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer-monster text-center py-3">
        <div class="container">
            <span>&copy; 2026 MonsterSups - Suplementos para sua Evolução | ADS</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
